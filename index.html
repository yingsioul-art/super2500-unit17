if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged = pickVoice;
function speak(text, rate, cb){
  speechSynthesis.cancel();
  if(!VOICE) pickVoice();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; if(VOICE) u.voice=VOICE; u.rate = rate||1;
  if(cb) u.onend = cb;
  speechSynthesis.speak(u);
}
function speakSeq(items){ // [{t,rate}]
  speechSynthesis.cancel();
  let i=0;
  function next(){
    if(i>=items.length) return;
    const it = items[i++];
    if(!VOICE) pickVoice();
    const u = new SpeechSynthesisUtterance(it.t);
    u.lang='en-US'; if(VOICE) u.voice=VOICE; u.rate=it.rate||1;
    u.onend = ()=>setTimeout(next, 350);
    speechSynthesis.speak(u);
  }
  next();
}
function firstEn(w){ return w.senses[0].en.split('=')[0].trim(); }

/* ============ speech recognition ============ */
const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition || null;
function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9' ]+/g,' ').replace(/\s+/g,' ').trim(); }

/* ================= helpers ================= */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clickableEn(sentence){
  return esc(sentence).split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)||!tok) return tok;
    const clean = tok.replace(/[^A-Za-z']/g,'');
    if(!clean) return tok;
    return '<span class="w" onclick="wordTap(this,\''+clean.replace(/'/g,"\\'")+'\')">'+tok+'</span>';
  }).join('');
}
function wordTap(el, w){
  speak(w,1);
  el.classList.add('hl'); setTimeout(()=>el.classList.remove('hl'), 900);
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function zhSummary(w){ return w.senses.map(s=>s.pos+' '+s.zh).join('｜'); }

/* ================= step 1: classify ================= */
let C = null;
function startClassify(){
  const pool = scopeWords().filter(w=>!S.cls[w.word]);

  }

}
function classifyCard(revealed, chosen){

  const w = byWord[C.pool[C.i]];

  h += '<div class="word-big">'+esc(w.word)+' <button class="btn sec small" onclick="speak(\''+w.word.replace(/'/g,"\\'")+'\')">🔊</button></div>';
  h += '<div class="kk">'+esc(w.kk)+'</div>';
  if(!revealed){
    h += '<div style="margin-top:18px" class="grid2">'+
      '<button class="btn" onclick="clsPick(\'fam\')">😊 熟悉</button>'+

  }else{
    h += '<div style="margin-top:12px;text-align:left">';
    w.senses.forEach(s=>{ h += '<div class="sense"><span class="tag">'+esc(s.pos)+'</span><span class="zh">'+esc(s.zh)+'</span></div>'; });
    if(w.forms) h += '<div class="center"><span class="tag forms">動詞三態：'+esc(w.forms)+'</span></div>';
    h += '</div>';
    h += '<div class="muted" style="margin:8px 0">你剛選了「'+(chosen==='fam'?'熟悉 😊':'不熟悉 🤔')+'」</div>';

function clsPick(k){
  S.cls[C.pool[C.i]] = k; save();

}
function clsSwitch(){
  S.cls[C.pool[C.i]] = 'unfam'; save();

}

function classifyDone(){
  const scope = scopeWords();

function planScreen(daysInput){
  const scope = scopeWords();
  const fam = scope.filter(w=>S.cls[w.word]==='fam');
  const unfam = scope.filter(w=>S.cls[w.word]!=='fam'); // 未分類也先當不熟悉
  const unclassified = scope.filter(w=>!S.cls[w.word]).length;
  const days = daysInput || (S.plan? S.plan.days : 3);
  let h = '<div class="topnav"><button class="btn ghost small" onclick="home()">‹ 回首頁</button><span class="pill">步驟 1.5</span></div>';
  h += '<div class="card"><b>目前狀況</b><div style="margin-top:6px">熟悉 <b style="color:var(--main)">'+fam.length+'</b> 字、不熟悉 <b style="color:var(--accent)">'+(unfam.length-unclassified)+'</b> 字'+
       (unclassified? '<div class="muted">（還有 '+unclassified+' 字未分類，先幫你算成不熟悉）</div>':'')+'</div></div>';
  h += '<div class="card center"><b>想分幾天學完？</b><div class="muted">建議 2～7 天，可自由填</div>'+
    '<div style="margin:12px 0"><input type="number" id="daysIn" min="2" max="14" value="'+days+'"> 天</div>'+

  app.innerHTML = h; window.scrollTo(0,0);
}
function buildPlan(days){
  const scope = scopeWords();
  const unfam = scope.filter(w=>S.cls[w.word]!=='fam').map(w=>w.word);
  const fam = scope.filter(w=>S.cls[w.word]==='fam').map(w=>w.word);
  const batches = Array.from({length:days},()=>[]);
  // 不熟悉字算 2 份、熟悉字算 1 份，平均分擔
  unfam.forEach((w,i)=>batches[i%days].push(w));
  const off = unfam.length % days;
  fam.forEach((w,i)=>batches[(i+off)%days].push(w));
  return {days, batches, cur:1, done:Array(days).fill(false), filter:S.filter};
}
function renderPlanPreview(p){
  let h = '<div class="card"><b>📋 '+p.days+' 天計畫</b>';
  p.batches.forEach((b,i)=>{
    const u = b.filter(w=>S.cls[w]!=='fam'), f = b.filter(w=>S.cls[w]==='fam');
    h += '<div class="day-row"><span><b>第 '+(i+1)+' 天</b> '+(p.done&&p.done[i]?'✅':'')+
      '<br><span class="muted" style="font-size:.82rem">'+b.map(w=>S.cls[w]!=='fam'?'<b style="color:var(--accent)">'+esc(w)+'</b>':esc(w)).join('、')+'</span></span>'+
      '<span class="pill">'+u.length+' 不熟＋'+f.length+' 熟</span></div>';
  });
  h += '</div>';
  return h;
}

function beginSession(order){
  const p = S.plan, batch = p.batches[p.cur-1].filter(w=>byWord[w]);
  const u = batch.filter(w=>S.cls[w]!=='fam'), f = batch.filter(w=>S.cls[w]==='fam');

  const st = S.session.stage;

}

  let h = '<div class="card center"><div style="font-size:1.25rem;font-weight:800">🎤 步驟4｜口說練習</div>';
  if(SRClass){
    h += '<div class="muted" style="margin:10px 0;text-align:left">先聽示範，再按「換我說」對著手機或電腦說出來，我會即時比對。<br><br>💡 第一次會跳出「允許使用麥克風」——同意之後才聽得到你的聲音，只在練習時用，不會錄存。</div>';
  }else{
    h += '<div class="banner" style="text-align:left">你的瀏覽器不支援語音辨識（Safari／Firefox 常見），已自動切換成「自我評估模式」：一樣聽示範、自己跟著唸，唸完自己歸類就好。想要自動比對，建議改用 <b>Chrome</b> 開這個網頁。</div>';
  }
  h += '<button class="btn big" onclick="speakCard()">開始 ›</button></div>';
  app.innerHTML = h; window.scrollTo(0,0);
}
function speakCard(msg){
  const s = S.session;
  if(s.idx >= s.words.length){ s.idx=0; (s.doneParts=s.doneParts||{}).speak=true; save(); return sessionHub(); }
  const w = byWord[s.words[s.idx]];
  const sen = firstEn(w);
  let h = stageBar('🎤 發音練習');
  h += '<div class="card center">';
  h += '<div class="word-big">'+esc(w.word)+'</div><div class="kk">'+esc(w.kk)+'</div>';
  h += '<div class="muted">'+esc(zhSummary(w))+'</div>';
  h += '<div style="margin:10px 0"><span class="muted">示範：</span>'+
    '<button class="btn sec small" onclick="speak(\''+w.word.replace(/'/g,"\\'")+'\',1)">🔊 單字</button>'+
    '<button class="btn sec small" onclick="speak(\''+sen.replace(/'/g,"\\'")+'\',1)">🔊 例句</button>'+
    '<button class="btn sec small" onclick="speak(\''+sen.replace(/'/g,"\\'")+'\',0.62)">🐢 例句慢速</button></div>';
  h += '<div class="sense" style="text-align:left"><div class="en">'+clickableEn(sen)+'</div><div class="tr">'+esc(w.senses[0].zh_tr)+'</div></div>';
  if(SRClass){
    h += '<div style="margin:6px 0"><button class="btn warm" onclick="startRec(\'word\')">🎙️ 換我說：單字</button>'+
         '<button class="btn warm" onclick="startRec(\'sentence\')">🎙️ 換我說：例句</button></div>';
    h += '<div class="speech-box" id="srBox">'+(msg||'按上面的「換我說」開始 🎤')+'</div>';
    h += '<div><button class="btn ghost small" onclick="speakCard()">🔁 再說一次（清空）</button></div>';
  }else{
    h += '<div class="banner">自我評估模式：聽完示範自己唸一次，覺得如何自己選 👇</div>';
  }
  h += '<div class="muted" style="margin-top:10px">唸完之後，自己歸類：</div>';
  h += '<div class="grid2" style="margin-top:8px">'+
    '<button class="btn" onclick="speakSelf(\'ok\')">😄 發音沒問題</button>'+
    '<button class="btn warm" onclick="speakSelf(\'more\')">📌 還要練（入複習）</button></div>';
  h += '<button class="btn ghost small" style="margin-top:8px" onclick="speakSelf(null)">略過這個字 ›</button>';
  h += '</div>';
  app.innerHTML = h; window.scrollTo(0,0);
}
function startRec(target){
  if(!SRClass) return;
  recTarget = target;
  const box = document.getElementById('srBox');
  speechSynthesis.cancel(); // 停掉還在播的示範音，避免搶麥克風
  try{ if(rec) rec.abort(); }catch(e){}
  rec = new SRClass();
  rec.lang='en-US'; rec.interimResults=true; rec.maxAlternatives=3;
  const w = byWord[S.session.words[S.session.idx]];
  const answer = target==='word'? w.word : firstEn(w);
  box.innerHTML = '⏳ 正在開啟麥克風…（第一次會請你按「允許」）';
  let gotFinal = false;
  const retryBtn = '<button class="btn warm-soft small" onclick="startRec(\''+target+'\')">🎙️ 再說一次</button>';
  const wd = setTimeout(()=>{ // 看門狗：太久沒結果就中止，不讓畫面卡死
    if(gotFinal) return;
    gotFinal = true;
    try{ rec.abort(); }catch(e){}
    box.innerHTML = '<span class="bad">等不到辨識結果</span>——可能是麥克風權限還沒按「允許」，或語音服務沒回應。'+
      '<br>可以再試，或直接自己唸一次、用下面按鈕歸類。 '+retryBtn;
  }, 12000);
  rec.onstart = ()=>{ if(!gotFinal) box.innerHTML = '🎙️ <span class="good">麥克風開了，說吧！</span>（請說：<i>'+esc(answer)+'</i>）'; };
  rec.onresult = (ev)=>{
    let txt=''; let final=false; let last=null;
    for(let i=0;i<ev.results.length;i++){ const r=ev.results[i]; last=r; txt=r[0].transcript; if(r.isFinal) final=true; }
    if(!final){ box.innerHTML = '🎙️ '+esc(txt)+' …'; return; }
    gotFinal = true; clearTimeout(wd);
    const hits = [];
    for(let i=0;i<last.length;i++){ if(last[i] && last[i].transcript) hits.push(last[i].transcript); }
    const ok = hits.some(t=>norm(t)===norm(answer)) || (target==='word' && hits.some(t=>norm(t).split(' ').includes(norm(answer))));
    if(ok){
      box.innerHTML = '<span class="good">'+pick(CHEERS)+'</span><br>你說的：「'+esc(txt)+'」　✔ 正確！';
    }else{
      box.innerHTML = '<span class="bad">'+pick(COMFORT)+'</span><br>你說的：「<span class="bad">'+esc(txt)+'</span>」<br>正解是：「<span class="good">'+esc(answer)+'</span>」<br>'+
        '<button class="btn sec small" onclick="speak(\''+answer.replace(/'/g,"\\'")+'\',0.62)">🐢 再聽一次示範</button>'+retryBtn;
    }
  };
  rec.onerror = (e)=>{
    if(gotFinal) return;
    gotFinal = true; clearTimeout(wd); // 避免 onend/看門狗再覆蓋訊息
    if(e.error==='not-allowed' || e.error==='service-not-allowed'){
      box.innerHTML = '<span class="bad">麥克風沒有開啟權限</span>：請點網址列的 🎤 或 🔒 圖示允許使用麥克風。'+
        (location.protocol==='file:'? '<br>💡 從電腦直接雙擊開啟（file://）時，Chrome 常不給麥克風權限——請改開線上版網址，口說辨識就會正常。':'')+
        '<br>也可以直接自我評估：自己唸一次，用下面按鈕歸類即可。';
    }else if(e.error==='no-speech'){
      box.innerHTML = '<span class="bad">沒有聽到聲音</span>，再靠近麥克風一點試試？ '+retryBtn;
    }else if(e.error==='network'){
      box.innerHTML = '<span class="bad">語音服務連不上（需要網路）</span>，等網路穩定再試。 '+retryBtn;
    }else{
      box.innerHTML = '<span class="bad">沒聽清楚，再試一次？</span> '+retryBtn;
    }
  };
  rec.onend = ()=>{
    if(!gotFinal){ gotFinal=true; clearTimeout(wd); box.innerHTML = '<span class="bad">沒有收到辨識結果</span>，再試一次？ '+retryBtn; }
  };
  try{ rec.start(); }catch(e){ gotFinal=true; clearTimeout(wd); box.innerHTML = '<span class="bad">啟動失敗</span>，再按一次試試。 '+retryBtn; }
}
function speakSelf(k){
  try{ if(rec) rec.abort(); }catch(e){}
  const s = S.session, w = s.words[s.idx];
  if(k==='more' && !S.review.includes(w)) S.review.push(w);
  s.idx++; save();
  speakCard();
}

/* ================= step 5: listening quiz ================= */
function makeQuiz(words){
  const scope = scopeWords(S.plan? S.plan.filter : S.filter);
  const poolWords = (scope.length>=4? scope: ALL).map(w=>w.word);
  return shuffle(words).map(word=>{
    const mode = Math.random()<0.5? 'w':'s';
    const others = shuffle(poolWords.filter(x=>x!==word)).slice(0,3);
    const opts = shuffle([word].concat(others));
    return {word, mode, opts, answered:false, correct:null};
  });
}
function quizCard(){
  const s = S.session;
  if(!s.quiz){ s.quiz = {items: makeQuiz(s.words), i:0, score:0}; save(); }
  const q = s.quiz;
  if(q.i >= q.items.length) return quizDone();
  const it = q.items[q.i];
  const w = byWord[it.word];
  const playText = it.mode==='w'? w.word : firstEn(w);
  let h = '<div class="topnav"><button class="btn ghost small" onclick="pauseToHome()">‹ 暫停</button><span class="pill">步驟5｜聽力測驗　'+(q.i+1)+' / '+q.items.length+'</span></div>';
  h += '<div class="pbar"><div style="width:'+Math.round(q.i/q.items.length*100)+'%"></div></div>';
  h += '<div class="card center"><div class="muted">仔細聽，他唸的是哪一個？</div>'+
    '<div style="margin:12px 0"><button class="btn" onclick="speak(\''+playText.replace(/'/g,"\\'")+'\',1)">🔊 再播一次</button>'+
    '<button class="btn sec" onclick="speak(\''+playText.replace(/'/g,"\\'")+'\',0.62)">🐢 慢速</button></div>';
  h += '<div id="opts" style="text-align:left">';
  it.opts.forEach((o,idx)=>{
    const label = it.mode==='w'? o : firstEn(byWord[o]);
    h += '<button class="opt" id="opt'+idx+'" onclick="quizPick('+idx+')">'+String.fromCharCode(65+idx)+'. '+esc(label)+'</button>';
  });
  h += '</div><div id="quizFb"></div></div>';
  app.innerHTML = h; window.scrollTo(0,0);
  speak(playText, 1);
}
function quizPick(idx){
  const s = S.session, q = s.quiz, it = q.items[q.i];
  if(it.answered) return;
  it.answered = true;
  const w = byWord[it.word];
  const correctIdx = it.opts.indexOf(it.word);
  for(let k=0;k<4;k++){ const b=document.getElementById('opt'+k); b.disabled=true; }
  document.getElementById('opt'+correctIdx).classList.add('right');
  const fb = document.getElementById('quizFb');
  if(idx===correctIdx){
    q.score++; it.correct=true;
    fb.innerHTML = '<div class="good" style="margin:8px 0">'+pick(CHEERS)+'　'+esc(it.word)+'｜'+esc(zhSummary(w))+'</div>'+
      '<div class="grid2"><button class="btn" onclick="quizNext(false)">😄 已掌握，下一題 ›</button>'+
      '<button class="btn warm" onclick="quizNext(true)">📌 還要複習</button></div>';
  }else{
    it.correct=false;
    document.getElementById('opt'+idx).classList.add('wrong');
    fb.innerHTML = '<div class="bad" style="margin:8px 0">'+pick(COMFORT)+'　正解：<b>'+esc(it.word)+'</b>｜'+esc(zhSummary(w))+'（已加入複習）</div>'+
      '<button class="btn big" onclick="quizNext(true)">下一題 ›</button>';
  }
  save();
}
function quizNext(toReview){
  const s = S.session, q = s.quiz, it = q.items[q.i];
  if(toReview && !S.review.includes(it.word)) S.review.push(it.word);
  if(!toReview && s.isReview){
    // 複習模式：答對且已掌握 → 從複習清單移除
    S.review = S.review.filter(x=>x!==it.word);
  }
  q.i++; save();
  quizCard();
}
function quizDone(){
  const s = S.session, q = s.quiz;
  const pct = Math.round(q.score/q.items.length*100);
  let h = '<div class="card center"><div style="font-size:1.3rem;font-weight:800">測驗結束 🎯</div>'+
    '<div class="score-big">'+q.score+' / '+q.items.length+'</div>'+
    '<div class="muted">'+(pct===100?'全對！超強！🏆':pct>=70?'表現很棒，剩下的交給複習！👏':'沒關係，複習幾輪就會了 🌱')+'</div>';
  if(s.isReview){
    S.session=null; save();
    if(S.review.length){
      h += '<div style="margin:10px 0">複習清單還剩 <b style="color:var(--accent)">'+S.review.length+'</b> 字</div>'+
        '<button class="btn big warm" onclick="reviewStart()">🔁 再跑一輪複習</button>';
    }else{
      h += '<div style="margin:10px 0" class="good">複習清單清空了！太厲害了 🎉</div>';
    }
    h += '<button class="btn ghost" onclick="home()">回首頁</button></div>';
  }else{
    if(S.plan){ S.plan.done[s.day-1]=true;
      const next = S.plan.done.findIndex(x=>!x);
      if(next>=0) S.plan.cur = next+1;
    }
    (s.doneParts=s.doneParts||{}).quiz=true; s.stage='hub'; save();
    h += '<div style="margin:10px 0">今天這批完成了！✅</div>';
    if(S.review.length) h += '<button class="btn big warm" onclick="reviewStart()">🔁 順手複習（'+S.review.length+' 字）</button>';
    h += '<button class="btn big sec" onclick="sessionHub()">回今日選單，再練其他項目 ›</button>';
    h += '<button class="btn ghost" onclick="dropSession()">今天到這裡，回首頁 🎈</button></div>';
  }
  app.innerHTML = h; window.scrollTo(0,0);
}

/* ================= step 6: review ================= */
function reviewStart(){
  if(!S.review.length) return home();
  const words = S.review.filter(w=>byWord[w]);
  S.session = {words, idx:0, stage:'hub', isReview:true, quiz:null, doneParts:{}};
  save();
  let h = '<div class="card center"><div style="font-size:1.2rem;font-weight:800">🔁 複習時間</div>'+
    '<div class="muted" style="margin:8px 0">這輪要複習 '+words.length+' 個字：<br><b style="color:var(--accent)">'+words.map(esc).join('、')+'</b><br>認識單字／發音／聽力測驗自由選；測驗答對並選「已掌握」就會從清單移除。</div>'+
    '<button class="btn big" onclick="sessionHub()">開始 ›</button>'+
    '<button class="btn ghost small" onclick="dropSession()">先不要，回首頁</button></div>';
  app.innerHTML = h; window.scrollTo(0,0);
}

/* ================= word list (全字一覽) ================= */
function wordListScreen(){
  let h = '<div class="topnav"><button class="btn ghost small" onclick="home()">‹ 回首頁</button><span class="pill">📚 單字總表</span></div>';
  h += '<div class="banner">兩篇全部列出，不受頁首篩選影響。點單字列展開課本細節，🔊 聽發音。</div>';
  [['basic','基礎學習篇（會考必備單字）'],['advanced','進階學習篇（英檢必備單字）']].forEach(sec=>{

function toggleWL(id){
  const el = document.getElementById(id);

}

/* ================= exercises (Try It!) ================= */
function exercisesScreen(tab){
  tab = tab||'reading';
  const EX = DATA.exercises;
  let h = '<div class="topnav"><button class="btn ghost small" onclick="home()">‹ 回首頁</button><span class="pill">會考題型練習</span></div>';
  h += '<div class="banner">📌 '+esc(EX.answer_source)+'</div>';
  h += '<div class="center" style="margin-bottom:10px">'+
    '<button class="btn '+(tab==='reading'?'':'sec')+'" onclick="exercisesScreen(\'reading\')">A 閱讀測驗</button>'+
    '<button class="btn '+(tab==='mc'?'':'sec')+'" onclick="exercisesScreen(\'mc\')">B 單字選擇</button></div>';
  if(tab==='reading'){
    h += '<div class="card"><b>📖 對話短文</b> <button class="btn sec small" onclick="playDialogue()">🔊 整段朗讀</button><div style="margin-top:8px">';
    EX.reading.dialogue.forEach(d=>{ h += '<div class="dlg-line"><span class="sp">'+esc(d.speaker)+':</span> '+clickableEn(d.text)+'</div>'; });
    h += '<div class="muted" style="margin-top:6px">💡 '+esc(EX.reading.note)+'</div></div></div>';
    h += quizBlock(EX.reading.questions, 'rc');
  }else{
    h += quizBlock(EX.mc.questions, 'mc');
  }
  app.innerHTML = h; window.scrollTo(0,0);
}
let EXA = {};
function quizBlock(qs, prefix){
  let h = '';
  qs.forEach((q,qi)=>{
    const key = prefix+qi;
    h += '<div class="card"><b>'+(qi+1)+'. '+esc(q.q)+'</b>';
    q.options.forEach((o,oi)=>{
      let cls='opt', dis='';
      if(EXA[key]!==undefined){
        dis='disabled';
        if(oi===q.answer) cls+=' right';
        else if(oi===EXA[key]) cls+=' wrong';
      }
      h += '<button class="'+cls+'" '+dis+' onclick="exAnswer(\''+prefix+'\','+qi+','+oi+')">('+String.fromCharCode(65+oi)+') '+esc(o)+'</button>';
    });
    if(EXA[key]!==undefined){
      h += EXA[key]===q.answer? '<div class="good">✔ 答對了！</div>' : '<div class="bad">✘ 正解是 ('+String.fromCharCode(65+q.answer)+')</div>';
    }
    h += '</div>';
  });
  const answered = qs.filter((q,qi)=>EXA[prefix+qi]!==undefined).length;
  const right = qs.filter((q,qi)=>EXA[prefix+qi]===q.answer).length;
  h += '<div class="card center"><b>已作答 '+answered+' / '+qs.length+'　答對 '+right+'</b><br><button class="btn warm-soft small" onclick="exReset(\''+prefix+'\','+qs.length+')">♻️ 重做這一區</button></div>';
  return h;
}
function exAnswer(prefix, qi, oi){
  EXA[prefix+qi]=oi;
  exercisesScreen(prefix==='rc'?'reading':'mc');
}
function exReset(prefix, n){
  for(let i=0;i<n;i++) delete EXA[prefix+i];
  exercisesScreen(prefix==='rc'?'reading':'mc');
}
function playDialogue(){
  speakSeq(DATA.exercises.reading.dialogue.map(d=>({t:d.text, rate:1})));
}

/* ================= boot ================= */
renderChips();
home();
</script>
